services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tienda
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  app: #SPRING_DATASOURCE_ dice a spring ignora lo que dice app.properties, usa estos valores
    build: . #en lugar de usar una imagen existente, la construye desde del dockerfile del directorio actual
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tienda
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on: #espera a que db esté listo antes arrancar app
      - db